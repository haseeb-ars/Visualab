name: Daily AI Blogger

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual trigger from the Actions tab in GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Daily Blog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and Push New Post (Auto-Publish)
        id: publish_blog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Detect new json files created in src/data/blog/
          NEW_BLOG_FILE=$(git status --porcelain | grep 'src/data/blog/' | grep '\.json' | awk '{print $2}')
          
          if [ -n "$NEW_BLOG_FILE" ]; then
            echo "New blog file detected: $NEW_BLOG_FILE"
            
            # Extract slug and title using Node.js
            SLUG=$(node -e "console.log(require('./$NEW_BLOG_FILE').slug)")
            TITLE=$(node -e "console.log(require('./$NEW_BLOG_FILE').title)")
            
            echo "SLUG=$SLUG" >> $GITHUB_ENV
            echo "TITLE=$TITLE" >> $GITHUB_ENV
            echo "NEW_BLOG_FOUND=true" >> $GITHUB_ENV
            
            git add "$NEW_BLOG_FILE"
            git commit -m "chore: automatically generate and publish daily AI blog post [skip ci]"
            git push
          else
            echo "No new blog generated today."
            echo "NEW_BLOG_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Send Daily SEO Report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          if [ "$NEW_BLOG_FOUND" = "true" ]; then
            node scripts/send-seo-report.js --blog-title="$TITLE" --blog-slug="$SLUG"
          else
            node scripts/send-seo-report.js
          fi
